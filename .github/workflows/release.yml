name: Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            artifact_name: 'macos-arm64'
            target: 'aarch64-apple-darwin'
            arch: 'aarch64'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            artifact_name: 'macos-x64'
            target: 'x86_64-apple-darwin'
            arch: 'x64'
          - platform: 'ubuntu-22.04'
            args: ''
            artifact_name: 'linux-x64'
            target: ''
            arch: ''
          - platform: 'windows-latest'
            args: ''
            artifact_name: 'windows-x64'
            target: ''
            arch: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Install create-dmg (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install create-dmg

      - name: Create .dmg (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          APP_PATH="src-tauri/target/${{ matrix.target }}/release/bundle/macos/SpendWise.app"
          create-dmg \
            --volname "SpendWise Installer" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "SpendWise.app" 200 190 \
            --app-drop-link 600 185 \
            --no-internet-enable \
            "SpendWise_${VERSION}_${{ matrix.arch }}.dmg" \
            "${APP_PATH}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.app
            src-tauri/target/**/release/bundle/**/*.app.tar.gz
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
            src-tauri/target/**/release/bundle/**/*.tar.gz
            src-tauri/target/**/release/bundle/**/latest.json
            src-tauri/target/**/release/bundle/**/*.sig
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded files
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        run: |
          set -e
          VERSION="v${{ github.run_number }}"
          NOTES="## SpendWise ${VERSION}

          Download the installer for your platform below.

          **Auto-updates**: This app checks for updates on startup. The \`latest.json\` file is included for the Tauri updater."

          # Collect release assets — exclude .app dirs and .app.tar.gz (only ship .dmg for macOS)
          ASSETS=()
          while IFS= read -r -d '' f; do
            ASSETS+=("$f")
          done < <(find artifacts -type f \
            -not -path "*/SpendWise.app/*" \
            -not -name "*.app" \
            -not -name "*.app.tar.gz" \
            -not -name "*.app.tar.gz.sig" \
            -print0)

          echo "Release assets:"
          printf '%s\n' "${ASSETS[@]}"

          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "::error::No release assets found"
            exit 1
          fi

          gh release create "${VERSION}" \
            --title "SpendWise ${VERSION}" \
            --notes "${NOTES}" \
            --draft \
            "${ASSETS[@]}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
