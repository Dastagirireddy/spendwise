<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpendWise</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div class="app-layout">
      <header class="topbar">
        <div class="topbar-left">
          <div class="topbar-logo-icon">
            <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="2" y="2" width="5.5" height="5.5" rx="1.5" fill="white" opacity="0.9"/>
              <rect x="10.5" y="2" width="5.5" height="5.5" rx="1.5" fill="white" opacity="0.65"/>
              <rect x="2" y="10.5" width="5.5" height="5.5" rx="1.5" fill="white" opacity="0.65"/>
              <rect x="10.5" y="10.5" width="5.5" height="5.5" rx="1.5" fill="white"/>
            </svg>
          </div>
          <span class="topbar-title">SpendWise</span>
        </div>
        <nav class="topbar-tabs">
          <button class="tab-item active" data-view="dashboard">
            <iconify-icon icon="lucide:layout-dashboard" class="tab-icon"></iconify-icon>
            <span>Dashboard</span>
          </button>
          <button class="tab-item" data-view="reports">
            <iconify-icon icon="lucide:bar-chart-3" class="tab-icon"></iconify-icon>
            <span>Reports</span>
          </button>
          <button class="tab-item" data-view="settings">
            <iconify-icon icon="lucide:settings" class="tab-icon"></iconify-icon>
            <span>Settings</span>
          </button>
        </nav>
        <div class="topbar-right">
          <div class="profile-switcher" id="profile-switcher">
            <button class="profile-btn" id="profile-btn">
              <iconify-icon icon="lucide:user" class="profile-icon"></iconify-icon>
              <span class="profile-name">Personal</span>
              <iconify-icon icon="lucide:chevron-down" class="profile-chevron"></iconify-icon>
            </button>
            <div class="profile-dropdown" id="profile-dropdown"></div>
          </div>
          <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
            <iconify-icon icon="lucide:sun" class="theme-icon-light"></iconify-icon>
            <iconify-icon icon="lucide:moon" class="theme-icon-dark"></iconify-icon>
          </button>
          <span class="topbar-version">v2.4</span>
        </div>
      </header>
      <main id="app-content" class="main-content">
        <div class="loading">Loading...</div>
      </main>
    </div>
  </body>
</html>
